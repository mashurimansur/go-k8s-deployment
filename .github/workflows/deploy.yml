name: CI/CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  # Run the centralized DevSecOps Go pipeline template (fixed secrets context)
  pipeline:
    uses: mashurimansur/pipeline-template/.github/workflows/pipeline-devsecops-go.yml@master
    with:
      go-version: '1.22'
      image-name: 'go-k8s-deployment'
      release-name: 'go-k8s-deployment'
      chart-path: './helm/go-k8s-deployment'
      namespace: 'dev'
    secrets: inherit
