name: CI/CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -v ./...

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/mashurimansur/go-k8s-deployment:latest
            ghcr.io/mashurimansur/go-k8s-deployment:${{ github.sha }}
          build-args: |
            VERSION=${{ github.sha }}

  deploy:
    runs-on: [self-hosted, home-k8s]
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to K8s via Helm
        run: |
          helm upgrade --install go-k8s-deployment ./helm/go-k8s-deployment \
            --namespace dev \
            --create-namespace \
            --set image.tag=${{ github.sha }}
